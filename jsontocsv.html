<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>JSON to CSV 변환기 (날짜 포맷 적용)</title>
    <style>
        body {
            font-family: '맑은 고딕', sans-serif;
            background-color: #f4f7f6;
            padding: 40px;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 { margin-top: 0; color: #2c3e50; }
        .upload-area {
            border: 2px dashed #3498db;
            padding: 40px 20px;
            text-align: center;
            border-radius: 6px;
            background-color: #f9fbff;
            margin: 20px 0;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .upload-area:hover { background-color: #eaf2f8; }
        button {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            display: none;
        }
        button:hover { background-color: #27ae60; }
    </style>
</head>
<body>

<div class="container">
    <h2>JSON ➔ CSV 추출기</h2>
    <p>JSON 파일을 선택하시면 <b>Comment가 있는 데이터만</b> 필터링하여 토양 성분 빈 컬럼과 함께 CSV로 변환합니다. (Date 항목은 YYYY-MM-DD HH:mm:ss 형식으로 변환됩니다.)</p>

    <div class="upload-area" id="uploadClick">
        <p>📥 이곳을 클릭하여 JSON 파일을 선택하세요.</p>
        <input type="file" id="fileInput" accept=".json" style="display: none;">
    </div>

    <button id="downloadBtn">CSV 다운로드</button>
</div>

<script>
    // ===============================================================
    // 💡 추가하고 싶은 빈 컬럼(토양 성분 등)의 이름을 적어주세요.
    // ===============================================================
    const soilColumns = [
        "Ca", "Clay", "Cond(EC)", "Cu", "Fe", "K", "Mg", "Mn", "OM",
        "P", "S", "Sand", "Silt", "Zn", "pH", "Si", "Total N"
    ];

    const fileInput = document.getElementById('fileInput');
    const uploadClick = document.getElementById('uploadClick');
    const downloadBtn = document.getElementById('downloadBtn');

    let csvData = "";

    uploadClick.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const text = event.target.result;
            const lines = text.split('\n');

            // 1. CSV 헤더 설정 (기본 컬럼에 Date 추가 + 추가 빈 컬럼)
            let header = "sampleNumber,Comment,Lon,Lat,Date";
            if (soilColumns.length > 0) {
                header += "," + soilColumns.join(",");
            }
            csvData = header + "\n";

            let validCount = 0;
            let skippedCount = 0;

            lines.forEach(line => {
                line = line.trim();
                if (!line) return;

                try {
                    const parsed = JSON.parse(line);
                    if (Array.isArray(parsed) && Array.isArray(parsed[0]) && parsed[0][0].v) {
                        const v = parsed[0][0].v;

                        // [조건 1] Comment가 빈칸이거나 Null이면 건너뛰기
                        const comment = v.Comment !== null && v.Comment !== undefined ? String(v.Comment).trim() : "";
                        if (comment === "") {
                            skippedCount++;
                            return; // 현재 줄 패스
                        }

                        const sampleNumber = v.sampleNumber !== undefined ? v.sampleNumber : "";
                        const lon = v.Lon !== undefined ? v.Lon : "";
                        const lat = v.Lat !== undefined ? v.Lat : "";

                        // [조건 2] Date 항목을 YYYY-MM-DD HH:mm:ss 형식으로 변환
                        let dateStr = "";
                        if (v.Date) {
                            // 13자리 밀리초 타임스탬프를 Date 객체로 변환
                            const d = new Date(v.Date);

                            const yyyy = d.getFullYear();
                            // 달(Month)은 0부터 시작하므로 1을 더해줍니다. 한자리면 앞에 '0'을 붙입니다.
                            const mm = String(d.getMonth() + 1).padStart(2, '0');
                            const dd = String(d.getDate()).padStart(2, '0');

                            const hh = String(d.getHours()).padStart(2, '0');
                            const min = String(d.getMinutes()).padStart(2, '0');
                            const ss = String(d.getSeconds()).padStart(2, '0');

                            // YYYY-MM-DD HH:mm:ss 형태로 조립
                            dateStr = `${yyyy}-${mm}-${dd} ${hh}:${min}:${ss}`;
                        }

                        // 2. 기본 데이터 나열
                        let rowData = `${sampleNumber},${comment},${lon},${lat},${dateStr}`;

                        // 3. 추가 컬럼 개수만큼 쉼표(,)를 찍어서 빈칸 만들기
                        if (soilColumns.length > 0) {
                            rowData += ",".repeat(soilColumns.length);
                        }

                        csvData += rowData + "\n";
                        validCount++;
                    }
                } catch (error) {
                    console.error("파싱 오류가 발생한 줄 무시:", error);
                }
            });

            if (validCount > 0) {
                downloadBtn.style.display = 'block';
                alert(`총 ${validCount}개의 데이터를 추출했습니다.\n(Comment가 없어 제외된 데이터: ${skippedCount}개)\n\n다운로드 버튼을 눌러주세요.`);
            } else {
                alert("조건에 맞는 데이터(Comment가 존재하는 행)가 없습니다.");
                downloadBtn.style.display = 'none';
            }
        };
        reader.readAsText(file);
    });

    downloadBtn.addEventListener('click', function() {
        const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
        const blob = new Blob([bom, csvData], { type: 'text/csv;charset=utf-8;' });

        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", "extracted_samples_filtered.csv");
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    });
</script>

</body>
</html>
